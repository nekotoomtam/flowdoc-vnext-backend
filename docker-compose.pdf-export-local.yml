name: flowdoc-pdf-export-local

services:
  postgres:
    image: postgres:17.10-alpine3.23@sha256:8189a1f6e40904781fc9e2612687877791d21679866db58b1de996b31fc312e4
    restart: "no"
    environment:
      POSTGRES_USER: ${FLOWDOC_PDF_LOCAL_POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${FLOWDOC_PDF_LOCAL_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${FLOWDOC_PDF_LOCAL_POSTGRES_DATABASE:?required}
    ports:
      - "127.0.0.1:${FLOWDOC_PDF_LOCAL_POSTGRES_PORT:?required}:5432"
    volumes:
      - flowdoc-pdf-local-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z@sha256:064117214caceaa8d8a90ef7caa58f2b2aeb316b5156afe9ee8da5b4d83e12c8
    restart: "no"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${FLOWDOC_PDF_LOCAL_S3_ACCESS_KEY_ID:?required}
      MINIO_ROOT_PASSWORD: ${FLOWDOC_PDF_LOCAL_S3_SECRET_ACCESS_KEY:?required}
    ports:
      - "127.0.0.1:${FLOWDOC_PDF_LOCAL_S3_PORT:?required}:9000"
      - "127.0.0.1:${FLOWDOC_PDF_LOCAL_S3_CONSOLE_PORT:?required}:9001"
    volumes:
      - flowdoc-pdf-local-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

volumes:
  flowdoc-pdf-local-postgres:
  flowdoc-pdf-local-minio:
